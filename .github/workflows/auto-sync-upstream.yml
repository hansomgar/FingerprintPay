name: Auto Sync Upstream and Release

on:
  schedule:
    - cron: '0 0 */7 * *'
  workflow_dispatch:

concurrency:
  group: auto-sync-upstream
  cancel-in-progress: false

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout nonetwork branch
        uses: actions/checkout@v4
        with:
          ref: nonetwork
          fetch-depth: 0

      - name: Configure upstream repository
        run: |
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream https://github.com/eritpchy/FingerprintPay.git
          else
            git remote add upstream https://github.com/eritpchy/FingerprintPay.git
          fi
          git fetch upstream main --tags --force

      - name: Get latest upstream release tag
        id: get_release
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const release = await github.rest.repos.getLatestRelease({
              owner: 'eritpchy',
              repo: 'FingerprintPay'
            });
            return release.data.tag_name;

      - name: Check whether sync is needed
        id: check_sync
        run: |
          TAG_NAME="${{ steps.get_release.outputs.result }}"
          if [ -z "$TAG_NAME" ] || [ "$TAG_NAME" = "null" ]; then
            echo "Unable to resolve the latest upstream release tag."
            exit 1
          fi

          TAG_COMMIT="$(git rev-list -n 1 "$TAG_NAME")"
          if [ -z "$TAG_COMMIT" ]; then
            echo "Unable to resolve commit for upstream tag $TAG_NAME."
            exit 1
          fi

          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "tag_commit=$TAG_COMMIT" >> $GITHUB_OUTPUT

          if git merge-base --is-ancestor "$TAG_COMMIT" HEAD; then
            echo "need_sync=false" >> $GITHUB_OUTPUT
            echo "Upstream release $TAG_NAME is already included in nonetwork."
          else
            echo "need_sync=true" >> $GITHUB_OUTPUT
            echo "Upstream release $TAG_NAME is not in nonetwork yet."
          fi

      - name: Merge upstream release into nonetwork
        if: steps.check_sync.outputs.need_sync == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG_NAME="${{ steps.check_sync.outputs.tag_name }}"
          TAG_COMMIT="${{ steps.check_sync.outputs.tag_commit }}"
          git merge "$TAG_COMMIT" --no-ff -m "Sync upstream release ${TAG_NAME} into nonetwork"

      - name: Keep nonetwork version ahead of upstream
        if: steps.check_sync.outputs.need_sync == 'true'
        run: |
          TAG_NAME="${{ steps.check_sync.outputs.tag_name }}"
          TAG_COMMIT="${{ steps.check_sync.outputs.tag_commit }}"
          UPSTREAM_BUILD="$(git show "${TAG_COMMIT}:app/build.gradle")"
          UPSTREAM_VERSION_NAME="$(printf '%s\n' "$UPSTREAM_BUILD" | sed -n 's/.*versionName "\(.*\)".*/\1/p' | head -n 1)"
          UPSTREAM_VERSION_CODE="$(printf '%s\n' "$UPSTREAM_BUILD" | sed -n 's/.*versionCode \([0-9][0-9]*\).*/\1/p' | head -n 1)"

          if [ -z "$UPSTREAM_VERSION_NAME" ] || [ -z "$UPSTREAM_VERSION_CODE" ]; then
            echo "Unable to read upstream version information."
            exit 1
          fi

          IFS='.' read -r -a VERSION_PARTS <<< "$UPSTREAM_VERSION_NAME"
          LAST_INDEX=$((${#VERSION_PARTS[@]} - 1))
          VERSION_PARTS[$LAST_INDEX]=$((${VERSION_PARTS[$LAST_INDEX]} + 1))
          NONETWORK_VERSION_NAME="$(IFS=.; echo "${VERSION_PARTS[*]}")"
          NONETWORK_VERSION_CODE=$((UPSTREAM_VERSION_CODE + 1))

          python3 - "$NONETWORK_VERSION_NAME" "$NONETWORK_VERSION_CODE" <<'PY'
          import pathlib
          import re
          import sys

          version_name = sys.argv[1]
          version_code = sys.argv[2]
          path = pathlib.Path("app/build.gradle")
          text = path.read_text(encoding="utf-8")
          text = re.sub(r'versionCode\s+\d+', f"versionCode {version_code}", text, count=1)
          text = re.sub(r'versionName\s+"[^"]+"', f'versionName "{version_name}"', text, count=1)
          path.write_text(text, encoding="utf-8")
          PY

          git add app/build.gradle
          if ! git diff --cached --quiet; then
            git commit -m "Keep nonetwork version ahead of upstream ${TAG_NAME}"
          fi

      - name: Verify nonetwork customizations
        if: steps.check_sync.outputs.need_sync == 'true'
        run: |
          test ! -f app/src/main/java/com/surcumference/fingerprint/util/Umeng.java
          ! grep -q 'lazyUpdateWhenActivityAlive' app/src/main/java/com/surcumference/fingerprint/network/update/UpdateFactory.java
          grep -q '已删除赞助' app/src/main/java/com/surcumference/fingerprint/view/DonateView.java
          grep -q 'AUTHOR_ALIPAY = "hansomgar"' app/src/main/java/com/surcumference/fingerprint/Constant.java
          grep -q 'AUTHOR_WECHAT = "hansomgar"' app/src/main/java/com/surcumference/fingerprint/Constant.java
          grep -q 'AUTHOR_QQ = "hansomgar"' app/src/main/java/com/surcumference/fingerprint/Constant.java
          grep -q 'AUTHOR_QQ_NAME = "hansomgar"' app/src/main/java/com/surcumference/fingerprint/Constant.java
          grep -q 'DONATE_ID_ALIPAY = ""' app/src/main/java/com/surcumference/fingerprint/Constant.java
          grep -q 'DONATE_ID_WECHAT = ""' app/src/main/java/com/surcumference/fingerprint/Constant.java
          grep -q '"hansomgar" + deviceId + "hansomgar"' app/src/main/java/com/surcumference/fingerprint/util/Config.java
          grep -q -- '-hansomgar' module/build.sh
          grep -q -- '-hansomgar' app/update-json.gradle
          grep -q -- '-hansomgar' app/debug.gradle

      - name: Push merged nonetwork branch
        if: steps.check_sync.outputs.need_sync == 'true'
        run: |
          git push origin nonetwork

      - name: Explain build trigger
        if: steps.check_sync.outputs.need_sync == 'true'
        run: |
          echo "Upstream release ${{ steps.check_sync.outputs.tag_name }} has been merged into nonetwork."
          echo "The resulting branch keeps the nonetwork version one step ahead of upstream."
          echo "androidRelease.yml will build and publish automatically from the nonetwork push trigger."

      - name: Explain no-op result
        if: steps.check_sync.outputs.need_sync != 'true'
        run: |
          echo "No new upstream release needs to be synced."
