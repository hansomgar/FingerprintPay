name: Auto Sync Upstream and Release

on:
  schedule:
    - cron: '0 0 */7 * *'
  workflow_dispatch:

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout nonetwork branch
        uses: actions/checkout@v4
        with:
          ref: nonetwork
          fetch-depth: 0

      - name: Add upstream repository
        run: |
          git remote add upstream https://github.com/eritpchy/FingerprintPay.git
          git fetch upstream

      - name: Get latest upstream release tag
        id: get_release
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const release = await github.rest.repos.getLatestRelease({
              owner: 'eritpchy',
              repo: 'FingerprintPay'
            });
            return release.data.tag_name;

      - name: Check if already synced
        id: check_sync
        run: |
          TAG_NAME="${{ steps.get_release.outputs.result }}"
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "synced=true" >> $GITHUB_OUTPUT
          else
            echo "synced=false" >> $GITHUB_OUTPUT
          fi

      - name: Merge upstream main to nonetwork
        if: steps.check_sync.outputs.synced == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge upstream/main --no-edit
          git push origin nonetwork

      - name: Trigger Android Release build
        if: steps.check_sync.outputs.synced == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'androidRelease.yml',
              ref: 'nonetwork'
            });
